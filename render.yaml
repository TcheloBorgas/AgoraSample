# Blueprint Render: um único serviço Web com FastAPI + UI estática (app.main monta web/).
# https://render.com/docs/blueprint-spec
# Variáveis sensíveis (MONGO_URI, GEMINI_API_KEY, Agora, etc.) — definir no painel Render.

services:
  - type: web
    name: agora-voice-scheduler
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
